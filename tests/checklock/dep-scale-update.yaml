apiVersion: admission.k8s.io/v1
kind: AdmissionReview
request:
  operation: UPDATE
  kind:
    group: autoscaling
    version: v1
    kind: Scale
  resource:
    group: apps
    version: v1
    resource: deployments
  subResource: scale
  name: web
  namespace: default
  oldObject:
    apiVersion: autoscaling/v1
    kind: Scale
    metadata:
      name: web
      namespace: default
    spec:
      replicas: 1
    status:
      replicas: 1
      selector: app=web
  object:
    apiVersion: autoscaling/v1
    kind: Scale
    metadata:
      name: web
      namespace: default
    spec:
      replicas: 2
    status:
      replicas: 1
      selector: app=web
