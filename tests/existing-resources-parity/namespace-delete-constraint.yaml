apiVersion: constraints.gatekeeper.sh/v1beta1
kind: EWExistingResources
metadata:
  name: namespace-must-have-no-pods
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Namespace"]
  parameters:
    operations: ["DELETE"]
    existingResources:
      kind: Pod
      sameNamespace: true
