kind: Suite
apiVersion: test.gatekeeper.sh/v1alpha1
metadata:
  name: earlywatch-gatekeeper
tests:
  - name: existing-resources
    template: ../library/gatekeeper-earlywatch/existing-resources/template.yaml
    constraint: ../library/gatekeeper-earlywatch/existing-resources/constraint.yaml
    cases:
      - name: deny-delete-when-pod-matches
        object: existing-resources/svc-delete.yaml
        inventory:
          - existing-resources/pod-matching.yaml
        assertions:
          - violations: yes
      - name: allow-delete-when-no-pod-matches
        object: existing-resources/svc-delete.yaml
        inventory:
          - existing-resources/pod-nonmatching.yaml
        assertions:
          - violations: no

  - name: name-reference-check
    template: ../library/gatekeeper-earlywatch/name-reference-check/template.yaml
    constraint: ../library/gatekeeper-earlywatch/name-reference-check/constraint.yaml
    cases:
      - name: deny-delete-when-deployment-references
        object: name-reference/cm-delete.yaml
        inventory:
          - name-reference/dep-references.yaml
        assertions:
          - violations: yes
      - name: allow-delete-when-no-reference
        object: name-reference/cm-delete.yaml
        inventory:
          - name-reference/dep-no-reference.yaml
        assertions:
          - violations: no

  - name: name-reference-check-default-version
    template: ../library/gatekeeper-earlywatch/name-reference-check/template.yaml
    constraint: name-reference/default-version-constraint.yaml
    cases:
      - name: deny-delete-when-resource-version-omitted-defaults-to-v1
        object: name-reference/cm-delete.yaml
        inventory:
          - name-reference/dep-references.yaml
        assertions:
          - violations: yes

  - name: annotation-check
    template: ../library/gatekeeper-earlywatch/annotation-check/template.yaml
    constraint: ../library/gatekeeper-earlywatch/annotation-check/constraint.yaml
    cases:
      - name: deny-when-annotation-missing
        object: annotation/ns-delete-no-anno.yaml
        assertions:
          - violations: yes
      - name: deny-when-annotation-wrong
        object: annotation/ns-delete-wrong-anno.yaml
        assertions:
          - violations: yes
      - name: allow-when-annotation-correct
        object: annotation/ns-delete-correct-anno.yaml
        assertions:
          - violations: no

  - name: checklock
    template: ../library/gatekeeper-earlywatch/check-lock/template.yaml
    constraint: ../library/gatekeeper-earlywatch/check-lock/constraint.yaml
    cases:
      - name: deny-delete-when-locked
        object: checklock/dep-delete-locked.yaml
        assertions:
          - violations: yes
      - name: deny-delete-when-lock-value-is-not-true
        object: checklock/dep-delete-locked-other-value.yaml
        assertions:
          - violations: yes
      - name: deny-update-when-locked
        object: checklock/dep-update-locked.yaml
        assertions:
          - violations: yes
      - name: allow-unlock-only-update
        object: checklock/dep-update-unlock-only.yaml
        assertions:
          - violations: no
      - name: allow-lock-annotation-value-only-update
        object: checklock/dep-update-lock-value-only.yaml
        assertions:
          - violations: no
      - name: allow-unlock-only-update-with-server-managed-metadata
        object: checklock/dep-update-unlock-only-managed-metadata.yaml
        assertions:
          - violations: no
      - name: deny-unlock-plus-other-change
        object: checklock/dep-update-unlock-and-change.yaml
        assertions:
          - violations: yes
      - name: deny-unlock-plus-status-change
        object: checklock/dep-update-unlock-and-status-change.yaml
        assertions:
          - violations: yes
      - name: allow-delete-when-unlocked
        object: checklock/dep-delete-unlocked.yaml
        assertions:
          - violations: no
      - name: deny-scale-subresource-when-parent-deployment-locked
        object: checklock/dep-scale-update.yaml
        inventory:
          - checklock/dep-inventory-locked.yaml
        assertions:
          - violations: yes
      - name: allow-scale-subresource-when-parent-deployment-unlocked
        object: checklock/dep-scale-update.yaml
        inventory:
          - checklock/dep-inventory-unlocked.yaml
        assertions:
          - violations: no

  - name: expression-check
    template: ../library/gatekeeper-earlywatch/expression-check/template.yaml
    constraint: ../library/gatekeeper-earlywatch/expression-check/constraint.yaml
    cases:
      - name: deny-delete-in-production
        object: expression/cm-delete-prod.yaml
        assertions:
          - violations: yes
      - name: allow-delete-elsewhere
        object: expression/cm-delete-staging.yaml
        assertions:
          - violations: no

  - name: service-pod-selector-check
    template: ../library/gatekeeper-earlywatch/service-pod-selector-check/template.yaml
    constraint: ../library/gatekeeper-earlywatch/service-pod-selector-check/constraint.yaml
    cases:
      - name: allow-create-with-zero-matching-pods
        object: service-selector/svc-create.yaml
        inventory:
          - service-selector/pod-nonmatching.yaml
        assertions:
          - violations: no
      - name: allow-create-with-matching-pod
        object: service-selector/svc-create.yaml
        inventory:
          - service-selector/pod-matching.yaml
        assertions:
          - violations: no
      - name: deny-update-when-old-had-pod-new-has-zero
        object: service-selector/svc-update.yaml
        inventory:
          - service-selector/pod-matching.yaml
        assertions:
          - violations: yes
      - name: allow-update-when-old-selector-had-zero-pods
        object: service-selector/svc-update.yaml
        inventory:
          - service-selector/pod-nonmatching.yaml
        assertions:
          - violations: no
      - name: allow-update-when-new-selector-has-pod
        object: service-selector/svc-update.yaml
        inventory:
          - service-selector/pod-matching.yaml
          - service-selector/pod-new-matching.yaml
        assertions:
          - violations: no
      - name: allow-headless-service-update
        object: service-selector/svc-update-headless.yaml
        inventory:
          - service-selector/pod-matching.yaml
        assertions:
          - violations: no
      - name: allow-when-new-selector-is-empty-map-and-pods-exist
        object: service-selector/svc-update-new-empty-selector.yaml
        inventory:
          - service-selector/pod-matching.yaml
        assertions:
          - violations: no
      - name: deny-when-old-empty-selector-matched-pods-and-new-selector-matches-none
        object: service-selector/svc-update-old-empty-selector.yaml
        inventory:
          - service-selector/pod-nonmatching.yaml
        assertions:
          - violations: yes
      - name: deny-when-non-headless-service-changes-to-headless-and-new-selector-matches-none
        object: service-selector/svc-update-to-headless.yaml
        inventory:
          - service-selector/pod-matching.yaml
        assertions:
          - violations: yes

  - name: expression-check-regex
    template: ../library/gatekeeper-earlywatch/expression-check/template.yaml
    constraint: ../library/gatekeeper-earlywatch/expression-check/constraint-regex.yaml
    cases:
      - name: deny-by-namespace-regex
        object: expression/cm-delete-prod.yaml
        assertions:
          - violations: yes
      - name: deny-by-name-regex
        object: expression/cm-delete-staging-critical.yaml
        assertions:
          - violations: yes
      - name: allow-when-no-predicate-matches
        object: expression/cm-delete-staging.yaml
        assertions:
          - violations: no

  - name: data-key-safety-check
    template: ../library/gatekeeper-earlywatch/data-key-safety-check/template.yaml
    constraint: ../library/gatekeeper-earlywatch/data-key-safety-check/constraint.yaml
    cases:
      - name: deny-when-key-still-referenced
        object: datakey/cm-update-drop-key.yaml
        inventory:
          - datakey/pod-references-removed-key.yaml
        assertions:
          - violations: yes
      - name: allow-when-only-other-keys-referenced
        object: datakey/cm-update-drop-key.yaml
        inventory:
          - datakey/pod-references-kept-key.yaml
        assertions:
          - violations: no
      - name: deny-when-binary-data-key-still-referenced
        object: datakey/cm-update-drop-binary-key.yaml
        inventory:
          - datakey/pod-references-binary-key.yaml
        assertions:
          - violations: yes

  - name: data-key-safety-check-default-version
    template: ../library/gatekeeper-earlywatch/data-key-safety-check/template.yaml
    constraint: datakey/default-version-constraint.yaml
    cases:
      - name: deny-when-resource-version-omitted-defaults-to-v1
        object: datakey/cm-update-drop-key.yaml
        inventory:
          - datakey/pod-references-removed-key.yaml
        assertions:
          - violations: yes

  - name: existing-resources-static-selector
    template: ../library/gatekeeper-earlywatch/existing-resources/template.yaml
    constraint: ../library/gatekeeper-earlywatch/existing-resources/constraint-static.yaml
    cases:
      - name: deny-when-In-matches
        object: existing-resources-static/svc-delete.yaml
        inventory:
          - existing-resources-static/pod-prod.yaml
        assertions:
          - violations: yes
      - name: allow-when-In-does-not-match
        object: existing-resources-static/svc-delete.yaml
        inventory:
          - existing-resources-static/pod-dev.yaml
        assertions:
          - violations: no

  - name: existing-resources-upstream-parity
    template: ../library/gatekeeper-earlywatch/existing-resources/template.yaml
    constraint: existing-resources-parity/no-selector-constraint.yaml
    cases:
      - name: deny-no-selector-matches-any-dependent
        object: existing-resources/svc-delete.yaml
        inventory:
          - existing-resources/pod-nonmatching.yaml
        assertions:
          - violations: yes

  - name: existing-resources-empty-static-selector
    template: ../library/gatekeeper-earlywatch/existing-resources/template.yaml
    constraint: existing-resources-parity/empty-static-selector-constraint.yaml
    cases:
      - name: deny-empty-static-selector-matches-any-dependent
        object: existing-resources/svc-delete.yaml
        inventory:
          - existing-resources/pod-nonmatching.yaml
        assertions:
          - violations: yes

  - name: existing-resources-field-selector-precedence
    template: ../library/gatekeeper-earlywatch/existing-resources/template.yaml
    constraint: existing-resources-parity/field-wins-over-static-constraint.yaml
    cases:
      - name: allow-when-field-selector-does-not-match-even-if-static-would
        object: existing-resources/svc-delete.yaml
        inventory:
          - existing-resources-static/pod-prod.yaml
        assertions:
          - violations: no

  - name: existing-resources-namespace-delete-scope
    template: ../library/gatekeeper-earlywatch/existing-resources/template.yaml
    constraint: existing-resources-parity/namespace-delete-constraint.yaml
    cases:
      - name: deny-namespace-delete-when-dependent-exists-inside-namespace
        object: existing-resources-parity/ns-delete.yaml
        inventory:
          - existing-resources-parity/pod-in-prod.yaml
        assertions:
          - violations: yes

  # ManualTouchCheck uses Gatekeeper external_data(), which gator does not
  # provide. The touch-monitor Go tests cover provider/cache behavior; live
  # Gatekeeper validation covers the external-data template wiring.

  # Malformed-input fixtures: defensively validate that templates don't crash
  # on missing oldObject, empty annotations, or missing labels.
  - name: malformed-inputs
    template: ../library/gatekeeper-earlywatch/annotation-check/template.yaml
    constraint: ../library/gatekeeper-earlywatch/annotation-check/constraint.yaml
    cases:
      - name: missing-annotations-map
        object: malformed/ns-delete-no-annotations-map.yaml
        assertions:
          - violations: yes
