# Single-entrypoint kustomization for the EarlyWatch-on-Gatekeeper stack.
#
# Apply order is important — Gatekeeper requires:
#   1. ConstraintTemplates reconciled before Constraints
#   2. Provider CR created before any constraint that references it
#   3. Config sync set up before referential constraints fire
#
# Keep kustomize output in this `resources` order instead of the legacy
# kind-based sort, which would otherwise place Constraints before their
# ConstraintTemplates. Gatekeeper still creates constraint CRDs asynchronously,
# so fresh installs may need a second `kubectl apply -k .` after templates are
# established.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

sortOptions:
  order: fifo

resources:
  # 1. Inventory sync first.
  - library/gatekeeper-earlywatch/config-sync.yaml

  # 2. ConstraintTemplates + Provider.
  - library/gatekeeper-earlywatch/existing-resources/template.yaml
  - library/gatekeeper-earlywatch/name-reference-check/template.yaml
  - library/gatekeeper-earlywatch/annotation-check/template.yaml
  - library/gatekeeper-earlywatch/approval-check/template.yaml
  - library/gatekeeper-earlywatch/check-lock/template.yaml
  - library/gatekeeper-earlywatch/expression-check/template.yaml
  - library/gatekeeper-earlywatch/expression-check/template-regex.yaml
  - library/gatekeeper-earlywatch/manual-touch-check/template.yaml
  - library/gatekeeper-earlywatch/manual-touch-check/provider.yaml
  - library/gatekeeper-earlywatch/service-pod-selector-check/template.yaml
  - library/gatekeeper-earlywatch/data-key-safety-check/template.yaml

  # 3. Provider deployment + hardening.
  - provider/manifests/deployment.yaml
  - provider/manifests/provider.yaml
  - provider/manifests/hardening.yaml

  # 4. Manual-touch audit-webhook producer. Kubernetes API server audit
  #    webhook configuration is external to this kustomization; see
  #    touch-monitor/README.md.
  - touch-monitor/manifests/audit-monitor.yaml

  # 5. Constraints last so the templates and provider are guaranteed to exist.
  - library/gatekeeper-earlywatch/existing-resources/constraint.yaml
  - library/gatekeeper-earlywatch/existing-resources/constraint-static.yaml
  - library/gatekeeper-earlywatch/name-reference-check/constraint.yaml
  - library/gatekeeper-earlywatch/annotation-check/constraint.yaml
  - library/gatekeeper-earlywatch/approval-check/constraint.yaml
  - library/gatekeeper-earlywatch/check-lock/constraint.yaml
  - library/gatekeeper-earlywatch/expression-check/constraint.yaml
  - library/gatekeeper-earlywatch/expression-check/constraint-regex.yaml
  - library/gatekeeper-earlywatch/manual-touch-check/constraint.yaml
  - library/gatekeeper-earlywatch/service-pod-selector-check/constraint.yaml
  - library/gatekeeper-earlywatch/data-key-safety-check/constraint.yaml
