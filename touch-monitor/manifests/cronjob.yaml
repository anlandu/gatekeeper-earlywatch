# EarlyWatch ManualTouchEvent producer (CronJob)
#
# Minimal Gatekeeper-side producer of `ManualTouchEvent` CRs so that the
# ManualTouchCheck constraint has events to consume even when the upstream
# EarlyWatch ManualTouchMonitor controller isn't deployed.
#
# Strategy: a CronJob runs `kubectl get events` over `--field-selector` for the
# operations the operator wants to track, and writes a ManualTouchEvent CR for
# each entry within a recent window. This is intentionally simple and not a
# full audit-log integration — that's the upstream monitor's job. Use this when
# you want a parity-complete demo or a stopgap until the upstream monitor is
# installed.
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: manualtouchevents.earlywatch.io
spec:
  group: earlywatch.io
  scope: Namespaced
  names:
    kind: ManualTouchEvent
    listKind: ManualTouchEventList
    singular: manualtouchevent
    plural: manualtouchevents
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                timestamp: {type: string}
                user:      {type: string}
                operation: {type: string}
                resource:
                  type: object
                  properties:
                    apiGroup:  {type: string}
                    version:   {type: string}
                    kind:      {type: string}
                    namespace: {type: string}
                    name:      {type: string}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: manual-touch-monitor
  namespace: gatekeeper-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manual-touch-monitor
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["earlywatch.io"]
    resources: ["manualtouchevents"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manual-touch-monitor
subjects:
  - kind: ServiceAccount
    name: manual-touch-monitor
    namespace: gatekeeper-system
roleRef:
  kind: ClusterRole
  name: manual-touch-monitor
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: manual-touch-monitor
  namespace: gatekeeper-system
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: manual-touch-monitor
          restartPolicy: OnFailure
          containers:
            - name: monitor
              image: bitnami/kubectl:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  NS="${EVENT_NAMESPACE:-early-watch-system}"
                  WINDOW="${WINDOW_MINUTES:-10}"
                  NOW=$(date -u +%FT%TZ)
                  # Find recent UPDATE/PATCH/DELETE events from the audit/event
                  # stream and stamp a ManualTouchEvent for each.
                  kubectl get events --all-namespaces \
                    -o json \
                    --field-selector reason=Updated \
                    | jq -r --arg now "$NOW" '
                      .items[]
                      | "{\"apiVersion\":\"earlywatch.io/v1alpha1\",\"kind\":\"ManualTouchEvent\",\"metadata\":{\"name\":\"\(.metadata.uid)\",\"namespace\":\"" + env.NS + "\"},\"spec\":{\"timestamp\":\"\($now)\",\"user\":(.reportingComponent // \"unknown\"),\"operation\":\"UPDATE\",\"resource\":{\"namespace\":(.involvedObject.namespace // \"\"),\"name\":(.involvedObject.name // \"\"),\"kind\":(.involvedObject.kind // \"\")}}}"' \
                    | while read -r line; do
                        echo "$line" | kubectl apply -f - || true
                      done
              env:
                - name: EVENT_NAMESPACE
                  value: early-watch-system
                - name: WINDOW_MINUTES
                  value: "10"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities: {drop: ["ALL"]}
