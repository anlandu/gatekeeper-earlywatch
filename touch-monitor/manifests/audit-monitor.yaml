# ManualTouch audit-webhook producer.
#
# This replaces the old Event-scanning CronJob. The Deployment receives
# Kubernetes audit.k8s.io/v1 EventList webhook batches at /audit, evaluates
# ManualTouchMonitor CRs, and writes EarlyWatch-compatible ManualTouchEvent CRs
# for EWManualTouchCheck to consume.
---
apiVersion: v1
kind: Namespace
metadata:
  name: early-watch-system
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: manualtouchevents.earlywatch.io
spec:
  group: earlywatch.io
  scope: Namespaced
  names:
    kind: ManualTouchEvent
    listKind: ManualTouchEventList
    singular: manualtouchevent
    plural: manualtouchevents
    shortNames: [mte]
    categories: [earlywatch]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: User
          type: string
          jsonPath: .spec.user
        - name: Operation
          type: string
          jsonPath: .spec.operation
        - name: Resource
          type: string
          jsonPath: .spec.resource
        - name: ResourceName
          type: string
          jsonPath: .spec.resourceName
        - name: Namespace
          type: string
          jsonPath: .spec.resourceNamespace
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: ManualTouchEvent records one manual touch detected by the audit monitor.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - timestamp
                - user
                - userAgent
                - operation
                - resource
                - resourceName
                - auditID
                - monitorName
                - monitorNamespace
              properties:
                timestamp:
                  type: string
                  format: date-time
                user:
                  type: string
                userAgent:
                  type: string
                operation:
                  type: string
                  enum: [DELETE, CREATE, UPDATE]
                apiGroup:
                  type: string
                resource:
                  type: string
                resourceName:
                  type: string
                resourceNamespace:
                  type: string
                sourceIP:
                  type: string
                auditID:
                  type: string
                monitorName:
                  type: string
                monitorNamespace:
                  type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: manualtouchmonitors.earlywatch.io
spec:
  group: earlywatch.io
  scope: Namespaced
  names:
    kind: ManualTouchMonitor
    listKind: ManualTouchMonitorList
    singular: manualtouchmonitor
    plural: manualtouchmonitors
    shortNames: [mtm]
    categories: [earlywatch]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
        - name: Touches
          type: integer
          jsonPath: .status.touchesDetected
      schema:
        openAPIV3Schema:
          description: ManualTouchMonitor declares resources and operations monitored for manual touches.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - subjects
                - operations
              properties:
                subjects:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - resource
                    properties:
                      apiGroup:
                        type: string
                      resource:
                        type: string
                      namespaceSelector:
                        type: object
                        properties:
                          matchLabels:
                            type: object
                            additionalProperties:
                              type: string
                          matchExpressions:
                            type: array
                            items:
                              type: object
                              required:
                                - key
                                - operator
                              properties:
                                key:
                                  type: string
                                operator:
                                  type: string
                                values:
                                  type: array
                                  items:
                                    type: string
                operations:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [DELETE, CREATE, UPDATE]
                userAgentPatterns:
                  type: array
                  items:
                    type: string
                excludeServiceAccounts:
                  type: array
                  items:
                    type: string
                alerting:
                  type: object
                  properties:
                    prometheusLabels:
                      type: object
                      additionalProperties:
                        type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                observedGeneration:
                  type: integer
                  format: int64
                touchesDetected:
                  type: integer
                  format: int64
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: manual-touch-monitor
  namespace: early-watch-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manual-touch-monitor
rules:
  - apiGroups: ["earlywatch.io"]
    resources: ["manualtouchmonitors"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["earlywatch.io"]
    resources: ["manualtouchevents"]
    verbs: ["create", "get", "list"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manual-touch-monitor
subjects:
  - kind: ServiceAccount
    name: manual-touch-monitor
    namespace: early-watch-system
roleRef:
  kind: ClusterRole
  name: manual-touch-monitor
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manual-touch-monitor
  namespace: early-watch-system
  labels:
    app.kubernetes.io/name: earlywatch-on-gatekeeper
    app.kubernetes.io/component: manual-touch-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: earlywatch-on-gatekeeper
      app.kubernetes.io/component: manual-touch-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: earlywatch-on-gatekeeper
        app.kubernetes.io/component: manual-touch-monitor
    spec:
      serviceAccountName: manual-touch-monitor
      containers:
        - name: monitor
          image: ghcr.io/your-org/earlywatch-touch-monitor:latest
          imagePullPolicy: IfNotPresent
          args:
            - --listen-address=:8090
            - --event-namespace=early-watch-system
          ports:
            - name: audit
              containerPort: 8090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: audit
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: audit
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: manual-touch-monitor
  namespace: early-watch-system
  labels:
    app.kubernetes.io/name: earlywatch-on-gatekeeper
    app.kubernetes.io/component: manual-touch-monitor
spec:
  selector:
    app.kubernetes.io/name: earlywatch-on-gatekeeper
    app.kubernetes.io/component: manual-touch-monitor
  ports:
    - name: audit
      port: 8090
      targetPort: audit
      protocol: TCP
---
# Example monitor matching the shipped EWManualTouchCheck constraint:
# kubectl PATCH/UPDATE of apps Deployments in any namespace records events.
apiVersion: earlywatch.io/v1alpha1
kind: ManualTouchMonitor
metadata:
  name: deployments-update
  namespace: early-watch-system
spec:
  subjects:
    - apiGroup: apps
      resource: deployments
  operations: ["UPDATE"]
