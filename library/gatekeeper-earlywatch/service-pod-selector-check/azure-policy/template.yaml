# EarlyWatch ServicePodSelectorCheck -> Gatekeeper referential constraint
# Denies UPDATE of a Service when a non-headless old selector that previously
# matched Pods is changed to a selector matching zero Pods.
# Requires Pods synced into data.inventory.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewservicepodselectorcheck
  annotations:
    metadata.gatekeeper.sh/title: "Service Pod Selector Check"
    metadata.gatekeeper.sh/version: "1.0.0"
    description: "Prevents pod label changes or deletions that would break existing Service pod selectors."
    metadata.gatekeeper.sh/requires-sync-data: |
      [[{"groups":[""],"versions":["v1"],"kinds":["Pod"]}]]
spec:
  crd:
    spec:
      names:
        kind: EWServicePodSelectorCheck
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewservicepodselectorcheck

              import future.keywords.every

              missing_selector := {"__earlywatch_missing_selector": true}

              ns := input.review.object.metadata.namespace
              old_selector := object.get(object.get(input.review.oldObject, "spec", {}), "selector", missing_selector)
              new_selector := object.get(object.get(input.review.object, "spec", {}), "selector", missing_selector)

              has_selector(selector) {
                selector != missing_selector
              }

              pod_matches_selector(pod, selector) {
                # Upstream EarlyWatch distinguishes absent/nil selectors from an
                # empty selector map.  An absent selector selects no Pods, while
                # an empty map is converted to labels.Everything() and matches
                # any Pod in the Service namespace.
                every k, v in selector {
                  object.get(pod.metadata, "labels", {})[k] == v
                }
              }

              selector_matches_any_pod(selector) {
                has_selector(selector)
                some name
                pod := data.inventory.namespace[ns]["v1"]["Pod"][name]
                pod_matches_selector(pod, selector)
              }

              headless_service {
                # The upstream webhook exempts Services that were already
                # headless before the update.
                input.review.oldObject.spec.clusterIP == "None"
              }

              violation[{"msg": msg}] {
                input.review.kind.kind == "Service"
                input.review.operation == "UPDATE"
                not headless_service
                selector_matches_any_pod(old_selector)
                not selector_matches_any_pod(new_selector)
                msg := sprintf("Service %q in namespace %q would have zero matching Pods",
                  [input.review.object.metadata.name, ns])
              }
