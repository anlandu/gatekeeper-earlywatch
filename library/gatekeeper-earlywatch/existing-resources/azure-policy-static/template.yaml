# EarlyWatch ExistingResources (static-selector variant, simplified for Azure Policy demo).
#
# Denies DELETE of a Service in the namespace when any Pod in the same
# namespace carries label tier in {production, staging}. Hardcoded for
# kind=Pod, gv=v1, sameNamespace=true. Only `operations` remains parameterized.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewexistingresourcesstatic
  annotations:
    metadata.gatekeeper.sh/title: "Existing Resources (static selector)"
    metadata.gatekeeper.sh/version: "2.0.0"
    description: "Denies operations on a Service when a production-tier Pod still exists in the namespace."
    azure-policy.azure.com/requires-sync-data: |
      [[{"groups":[""],"versions":["v1"],"kinds":["Pod"]}]]
spec:
  crd:
    spec:
      names:
        kind: EWExistingResourcesStatic
      validation:
        openAPIV3Schema:
          type: object
          properties:
            operations:
              type: array
              items: {type: string}
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewexistingresourcesstatic

              import future.keywords.in

              review_object := object.get(input.review, "object", null)
              review_old_object := object.get(input.review, "oldObject", null)
              subject := s {
                review_object != null
                s := review_object
              } else := s {
                s := review_old_object
              }

              subject_metadata := object.get(subject, "metadata", {})
              subject_name := object.get(subject_metadata, "name", object.get(input.review, "name", ""))
              subject_ns := object.get(subject_metadata, "namespace", object.get(input.review, "namespace", ""))

              ops := object.get(input.parameters, "operations", ["DELETE"])

              tier_values := {"production", "staging"}

              matching_pod[name] {
                pod := data.inventory.namespace[subject_ns]["v1"]["Pod"][name]
                tier := object.get(object.get(pod.metadata, "labels", {}), "tier", "")
                tier in tier_values
              }

              violation[{"msg": msg}] {
                input.review.operation in ops
                some n
                matching_pod[n]
                msg := sprintf("Service %q in %q cannot be %sd: Pod %q with production-tier label still exists",
                  [subject_name, subject_ns, lower(input.review.operation), n])
              }
