# EarlyWatch ExistingResources (static-selector variant).
#
# Denies operations on a Service when any Pod in the same namespace carries
# the configured label `labelKey` with one of the values in `labelValues`.
# Hardcoded for kind=Pod, gv=v1, sameNamespace=true.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewexistingresourcesstatic
  annotations:
    metadata.gatekeeper.sh/title: "Existing Resources (static selector)"
    metadata.gatekeeper.sh/version: "3.0.0"
    description: "Denies operations on a Service when a Pod with a configurable label key/value still exists in the namespace."
    metadata.gatekeeper.sh/requires-sync-data: |
      [[{"groups":[""],"versions":["v1"],"kinds":["Pod"]}]]
spec:
  crd:
    spec:
      names:
        kind: EWExistingResourcesStatic
      validation:
        openAPIV3Schema:
          type: object
          properties:
            operations:
              type: array
              items: {type: string}
            labelKey:
              type: string
            labelValues:
              type: array
              items: {type: string}
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewexistingresourcesstatic

              import future.keywords.in

              review_object := object.get(input.review, "object", null)
              review_old_object := object.get(input.review, "oldObject", null)
              subject := s {
                review_object != null
                s := review_object
              } else := s {
                s := review_old_object
              }

              subject_metadata := object.get(subject, "metadata", {})
              subject_name := object.get(subject_metadata, "name", object.get(input.review, "name", ""))
              subject_ns := object.get(subject_metadata, "namespace", object.get(input.review, "namespace", ""))

              ops := object.get(input.parameters, "operations", ["DELETE"])
              label_key := object.get(input.parameters, "labelKey", "tier")
              label_values := {v | v := object.get(input.parameters, "labelValues", ["production", "staging"])[_]}

              matching_pod[name] {
                pod := data.inventory.namespace[subject_ns]["v1"]["Pod"][name]
                val := object.get(object.get(pod.metadata, "labels", {}), label_key, "")
                val in label_values
              }

              violation[{"msg": msg}] {
                input.review.operation in ops
                some n
                matching_pod[n]
                msg := sprintf("Service %q in %q cannot be %sd: Pod %q has label %s in %v",
                  [subject_name, subject_ns, lower(input.review.operation), n, label_key, label_values])
              }
