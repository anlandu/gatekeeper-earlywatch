# EarlyWatch ExistingResources (field-selector variant, simplified for Azure Policy demo).
#
# Denies DELETE of a Service when any Pod in the same namespace matches the
# Service's spec.selector. Hardcoded for kind=Pod, gv=v1, sameNamespace=true.
# Only `operations` remains parameterized.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewexistingresourcesfield
  annotations:
    metadata.gatekeeper.sh/title: "Existing Resources (field selector)"
    metadata.gatekeeper.sh/version: "2.0.0"
    description: "Denies operations on a Service when Pods still match its spec.selector."
    azure-policy.azure.com/requires-sync-data: |
      [[{"groups":[""],"versions":["v1"],"kinds":["Pod"]}]]
spec:
  crd:
    spec:
      names:
        kind: EWExistingResourcesField
      validation:
        openAPIV3Schema:
          type: object
          properties:
            operations:
              type: array
              items: {type: string}
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewexistingresourcesfield

              import future.keywords.every
              import future.keywords.in

              review_object := object.get(input.review, "object", null)
              review_old_object := object.get(input.review, "oldObject", null)
              subject := s {
                review_object != null
                s := review_object
              } else := s {
                s := review_old_object
              }

              subject_metadata := object.get(subject, "metadata", {})
              subject_name := object.get(subject_metadata, "name", object.get(input.review, "name", ""))
              subject_ns := object.get(subject_metadata, "namespace", object.get(input.review, "namespace", ""))

              ops := object.get(input.parameters, "operations", ["DELETE"])

              # Hardcoded field path: spec.selector (a map[string]string).
              field_selector := fs {
                fs := subject.spec.selector
                is_object(fs)
              }

              pod_matches_selector(pod, selector) {
                every k, v in selector {
                  object.get(pod.metadata, "labels", {})[k] == v
                }
              }

              matching_pod[name] {
                pod := data.inventory.namespace[subject_ns]["v1"]["Pod"][name]
                pod_matches_selector(pod, field_selector)
              }

              violation[{"msg": msg}] {
                input.review.operation in ops
                some n
                matching_pod[n]
                msg := sprintf("Service %q in %q cannot be %sd: Pod %q still matches its selector",
                  [subject_name, subject_ns, lower(input.review.operation), n])
              }
