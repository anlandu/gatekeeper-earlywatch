# EarlyWatch CheckLock -> Gatekeeper
# Blocks DELETE (and UPDATE when lockOnMutate=true) when `earlywatch.io/lock`
# annotation is set to a non-empty value on the existing object.
#
# UPDATE has one EarlyWatch escape hatch: if the only meaningful object
# difference is the `earlywatch.io/lock` annotation itself, the update is
# allowed. Kubernetes admission adds/churns server-managed metadata between
# oldObject and object, so those metadata fields are ignored before comparing.
# Status and user-controlled spec/metadata changes still count as additional
# changes.
#
# `kubectl scale` updates the Deployment scale subresource, whose AdmissionReview
# kind is autoscaling/v1 Scale and whose object does not carry the parent
# Deployment annotations. The template therefore looks up the parent Deployment
# from Gatekeeper inventory for Scale requests; keep Deployments synced in
# policy/00-config-sync.yaml.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewchecklock
  annotations:
    metadata.gatekeeper.sh/title: "Check Lock"
    metadata.gatekeeper.sh/version: "1.0.0"
    description: "Blocks updates or deletes to locked resources unless the change is limited to allowed lock metadata."
    metadata.gatekeeper.sh/requires-sync-data: |
      "[[{\"groups\":[\"apps\"],\"versions\":[\"v1\"],\"kinds\":[\"Deployment\"]}]]"
spec:
  crd:
    spec:
      names:
        kind: EWCheckLock
      validation:
        openAPIV3Schema:
          type: object
          properties:
            lockOnMutate:
              type: boolean
            annotation:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewchecklock

              default annotation_key := "earlywatch.io/lock"
              annotation_key := k {
                k := object.get(input.parameters, "annotation", "")
                k != ""
              }

              request_name := object.get(input.review, "name", "")
              request_namespace := object.get(input.review, "namespace", "")

              deployment_scale_request {
                input.review.kind.kind == "Scale"
                object.get(input.review.kind, "group", "") == "autoscaling"
                object.get(input.review.resource, "group", "") == "apps"
                object.get(input.review.resource, "resource", "") == "deployments"
              }

              lock_source := obj {
                deployment_scale_request
                obj := data.inventory.namespace[request_namespace]["apps/v1"]["Deployment"][request_name]
              }

              lock_source := input.review.oldObject {
                not deployment_scale_request
              }

              locked {
                v := lock_source.metadata.annotations[annotation_key]
                v != ""
              }

              # Normalize enough to recognize a lock-annotation-only update in
              # live admission requests. Kubernetes may represent empty
              # annotations as either an empty map or an absent field, and these
              # server-managed metadata fields may legitimately differ between
              # oldObject and object for an otherwise unlock-only request.
              metadata_strip_fields := {
                "annotations",
                "resourceVersion",
                "generation",
                "uid",
                "creationTimestamp",
                "managedFields",
                "selfLink",
              }

              clean_metadata(metadata) := clean {
                annotations := object.get(metadata, "annotations", {})
                clean_annotations := object.remove(annotations, {annotation_key})
                base_metadata := object.remove(metadata, metadata_strip_fields)
                count(clean_annotations) == 0
                clean := base_metadata
              }

              clean_metadata(metadata) := clean {
                annotations := object.get(metadata, "annotations", {})
                clean_annotations := object.remove(annotations, {annotation_key})
                base_metadata := object.remove(metadata, metadata_strip_fields)
                count(clean_annotations) > 0
                clean := object.union(base_metadata, {"annotations": clean_annotations})
              }

              without_lock_annotation(obj) := stripped {
                metadata := object.get(obj, "metadata", {})
                base_obj := object.remove(obj, {"metadata"})
                stripped := object.union(base_obj, {"metadata": clean_metadata(metadata)})
              }

              lock_annotation_only_update {
                without_lock_annotation(input.review.oldObject) == without_lock_annotation(input.review.object)
              }

              violation[{"msg": msg}] {
                input.review.operation == "DELETE"
                locked
                msg := sprintf("resource %q is locked by %q; delete denied",
                  [request_name, annotation_key])
              }

              violation[{"msg": msg}] {
                input.review.operation == "UPDATE"
                input.parameters.lockOnMutate == true
                locked
                not lock_annotation_only_update
                msg := sprintf("resource %q is locked by %q; update denied",
                  [request_name, annotation_key])
              }
