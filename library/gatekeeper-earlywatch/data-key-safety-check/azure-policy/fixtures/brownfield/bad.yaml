apiVersion: v1
kind: ConfigMap
metadata: {name: shared}
data:
  K1: v1
---
apiVersion: v1
kind: Pod
metadata: {name: refs}
spec:
  restartPolicy: Never
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep","3600"]
      env:
        - name: VAL
          valueFrom:
            configMapKeyRef:
              name: shared
              key: K1
