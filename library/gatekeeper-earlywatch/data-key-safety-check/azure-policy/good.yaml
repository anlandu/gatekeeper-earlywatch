apiVersion: v1
kind: ConfigMap
metadata: {name: shared-gf}
data:
  K1: v1
  K2: v2
---
apiVersion: v1
kind: Pod
metadata: {name: refs-gf}
spec:
  restartPolicy: Never
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep","3600"]
      env:
        - name: VAL
          valueFrom:
            configMapKeyRef:
              name: shared-gf
              key: K1
