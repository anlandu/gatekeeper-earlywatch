# EarlyWatch DataKeySafetyCheck -> Gatekeeper referential constraint (simplified for Azure Policy demo).
#
# Denies UPDATEs to ConfigMaps/Secrets that drop a data or binaryData key while
# any Pod in the same namespace still references that exact (name, key) pair
# via spec.containers.env.valueFrom.configMapKeyRef or secretKeyRef.
#
# Object-shaped `resources[]` parameter from upstream is hardcoded into the
# Rego body; only the scalar `sameNamespace` parameter remains.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewdatakeysafetycheck
  annotations:
    metadata.gatekeeper.sh/title: "Data Key Safety Check"
    metadata.gatekeeper.sh/version: "2.0.0"
    description: "Prevents removing ConfigMap or Secret data keys that are still referenced by Pods."
    azure-policy.azure.com/requires-sync-data: |
      [[{"groups":[""],"versions":["v1"],"kinds":["Pod"]}]]
spec:
  crd:
    spec:
      names:
        kind: EWDataKeySafetyCheck
      validation:
        openAPIV3Schema:
          type: object
          properties:
            sameNamespace: {type: boolean}
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewdatakeysafetycheck

              import future.keywords.in

              params      := input.parameters
              target_name := input.review.object.metadata.name
              target_ns   := input.review.object.metadata.namespace
              target_kind := input.review.kind.kind

              ref_subfield := "configMapKeyRef" { target_kind == "ConfigMap" }
              ref_subfield := "secretKeyRef"   { target_kind == "Secret" }

              object_keys(obj, field) := { k |
                object.get(obj, field, {})[k]
              }

              data_keys(obj) := { k |
                some field in ["data", "binaryData"]
                object_keys(obj, field)[k]
              }

              old_keys := data_keys(input.review.oldObject)
              new_keys := data_keys(input.review.object)
              removed_keys := old_keys - new_keys

              same_ns := object.get(params, "sameNamespace", true)

              referrer_pods := pods {
                same_ns == true
                pods := { sprintf("%s/%s", [target_ns, name]): o |
                  o := data.inventory.namespace[target_ns]["v1"]["Pod"][name]
                }
              }
              referrer_pods := pods {
                same_ns == false
                pods := { sprintf("%s/%s", [ns, name]): o |
                  some ns
                  o := data.inventory.namespace[ns]["v1"]["Pod"][name]
                }
              }

              referenced_key[refKey] {
                some pod_key
                pod := referrer_pods[pod_key]
                some ci
                container := pod.spec.containers[ci]
                some ei
                env := container.env[ei]
                ref := env.valueFrom[ref_subfield]
                ref.name == target_name
                refKey := ref.key
                refKey in removed_keys
              }

              violation[{"msg": msg}] {
                input.review.operation == "UPDATE"
                some k
                referenced_key[k]
                msg := sprintf("%s %q cannot drop key %q: a Pod in the cluster still references it",
                  [target_kind, target_name, k])
              }
