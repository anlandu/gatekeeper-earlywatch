# Second example: a CEL regex predicate.
#
# EarlyWatch's ExpressionCheck grammar is `field == 'value'` and does not
# include regex, so this template is *more* capable than EarlyWatch — it
# illustrates the upside of translating each rule to dedicated CEL: you get
# the full CEL standard library (here, `matches`) for free, in a one-liner.
#
# Deny DELETE when the namespace matches `^prod.*` OR the resource name
# matches `^critical-.*`.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewblockdeletecriticalinprod
  annotations:
    metadata.gatekeeper.sh/title: "Block DELETE of critical-* in prod*"
    metadata.gatekeeper.sh/version: "1.0.0"
    description: "Denies DELETE requests for critical-* resources in prod* namespaces."
spec:
  crd:
    spec:
      names:
        kind: EWBlockDeleteCriticalInProd
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewblockdeletecriticalinprod

              violation[{"msg": msg}] {
                input.review.operation == "DELETE"
                regex.match("^prod.*", input.review.namespace)
                msg := "Deletion of critical-* resources or resources in prod* namespaces is not permitted."
              }

              violation[{"msg": msg}] {
                input.review.operation == "DELETE"
                regex.match("^critical-.*", input.review.name)
                msg := "Deletion of critical-* resources or resources in prod* namespaces is not permitted."
              }
        - engine: K8sNativeValidation
          source:
            validations:
              - expression: |
                  !(request.operation == 'DELETE' &&
                    (request.namespace.matches('^prod.*') ||
                     request.name.matches('^critical-.*')))
                messageExpression: |
                  "Deletion of critical-* resources or resources in prod* namespaces is not permitted."
