# EarlyWatch ExpressionCheck (CEL-based deny).
#
# Denies operations whose namespace matches `namespacePattern` OR whose
# resource name matches `namePattern`. Reimplemented from the Rego version
# using the K8sNativeValidation engine so Gatekeeper generates a matching
# ValidatingAdmissionPolicy (and a VAPBinding per Constraint) when the
# addon's --default-create-vap-for-templates / -binding flags are on.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewexpressioncheck
  annotations:
    metadata.gatekeeper.sh/title: "Expression Check (CEL)"
    metadata.gatekeeper.sh/version: "3.0.0"
    description: "Denies operations whose namespace or name matches configurable regex patterns. CEL/K8sNativeValidation -> Gatekeeper generates a ValidatingAdmissionPolicy."
spec:
  crd:
    spec:
      names:
        kind: EWExpressionCheck
      validation:
        openAPIV3Schema:
          type: object
          properties:
            operations:
              type: array
              items: {type: string}
            namespacePattern:
              type: string
            namePattern:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: K8sNativeValidation
          source:
            # In the Gatekeeper-generated VAP, `params` is the entire Constraint CR,
            # so user-supplied fields live under params.spec.parameters.*.
            variables:
              - name: cfg
                expression: '!has(params.spec) || !has(params.spec.parameters) ? null : params.spec.parameters'
              - name: ops
                expression: 'variables.cfg == null || !has(variables.cfg.operations) ? [] : variables.cfg.operations'
              - name: nsPat
                expression: 'variables.cfg == null || !has(variables.cfg.namespacePattern) ? "" : variables.cfg.namespacePattern'
              - name: namePat
                expression: 'variables.cfg == null || !has(variables.cfg.namePattern) ? "" : variables.cfg.namePattern'
              - name: opInScope
                expression: 'request.operation in variables.ops'
            validations:
              # PASS if: op not in scope, OR pattern empty, OR namespace doesn't match.
              - expression: |
                  !variables.opInScope ||
                  variables.nsPat == "" ||
                  !(request.namespace.matches(variables.nsPat))
                messageExpression: |
                  "operation " + request.operation + " on " + request.name + " in namespace " + request.namespace + " is denied: namespace matches " + variables.nsPat
              - expression: |
                  !variables.opInScope ||
                  variables.namePat == "" ||
                  !(request.name.matches(variables.namePat))
                messageExpression: |
                  "operation " + request.operation + " on " + request.name + " in namespace " + request.namespace + " is denied: name matches " + variables.namePat
