# Example: translating a single EarlyWatch ExpressionCheck rule into a
# dedicated Gatekeeper ConstraintTemplate.
#
# Source EarlyWatch rule:
#   - name: block-delete-in-production
#     type: ExpressionCheck
#     expressionCheck:
#       expression: "namespace == 'production'"
#     message: "Direct deletion is not permitted in the production namespace."
#
# Design note: EarlyWatch's ExpressionCheck grammar is intentionally tiny —
# `field == 'value'` over {operation, namespace, name} — and is strictly less
# capable than CEL or Rego. Neither CEL nor Rego can eval() a string from
# constraint parameters at admission time, so a single "generic"
# ConstraintTemplate cannot accept an arbitrary EarlyWatch expression string
# and remain truly generic. The Gatekeeper-native pattern is the opposite:
# each EarlyWatch ExpressionCheck rule becomes its own ConstraintTemplate
# with the predicate inlined as a one-line CEL `expression`. See README.md.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewblockdeleteinproduction
  annotations:
    metadata.gatekeeper.sh/title: "Block DELETE in production"
    metadata.gatekeeper.sh/version: "1.0.0"
    description: "Denies DELETE requests in the production namespace."
spec:
  crd:
    spec:
      names:
        kind: EWBlockDeleteInProduction
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewblockdeleteinproduction

              violation[{"msg": msg}] {
                input.review.operation == "DELETE"
                input.review.namespace == "production"
                msg := "Direct deletion is not permitted in the production namespace."
              }
        - engine: K8sNativeValidation
          source:
            validations:
              - expression: |
                  !(request.operation == 'DELETE' && request.namespace == 'production')
                messageExpression: |
                  "Direct deletion is not permitted in the production namespace."
