apiVersion: v1
kind: ConfigMap
metadata: {name: bf-cm}
data: {k: v}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: bf-dep}
spec:
  replicas: 1
  selector: {matchLabels: {app: bf}}
  template:
    metadata: {labels: {app: bf}}
    spec:
      containers:
        - {name: c, image: nginx:alpine, volumeMounts: [{name: cfg, mountPath: /cfg}]}
      volumes:
        - {name: cfg, configMap: {name: bf-cm}}
