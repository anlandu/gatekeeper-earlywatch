# EarlyWatch NameReferenceCheck -> Gatekeeper referential constraint (simplified for Azure Policy demo).
#
# Denies DELETE of a ConfigMap when any Deployment in the cluster references
# it via one of the canonical referrer paths:
#   spec.template.spec.volumes.configMap.name
#   spec.template.spec.containers.envFrom.configMapRef.name
#   spec.template.spec.containers.env.valueFrom.configMapKeyRef.name
#
# Object-shaped `resources[]` parameter from upstream is hardcoded into the
# Rego body; only the scalar `operations` and `sameNamespace` remain.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewnamereferencecheck
  annotations:
    metadata.gatekeeper.sh/title: "Name Reference Check"
    metadata.gatekeeper.sh/version: "2.0.0"
    description: "Prevents deleting ConfigMaps that are still referenced by Deployments."
    metadata.gatekeeper.sh/requires-sync-data: |
      [[{"groups":["apps"],"versions":["v1"],"kinds":["Deployment"]}]]
spec:
  crd:
    spec:
      names:
        kind: EWNameReferenceCheck
      validation:
        openAPIV3Schema:
          type: object
          properties:
            sameNamespace: {type: boolean}
            operations:
              type: array
              items: {type: string}
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewnamereferencecheck

              import future.keywords.in

              target_name := input.review.oldObject.metadata.name
              target_ns   := input.review.oldObject.metadata.namespace
              params      := input.parameters
              same_ns     := object.get(params, "sameNamespace", true)
              ops         := object.get(params, "operations", ["DELETE"])

              referrer_deployments := deps {
                same_ns == true
                deps := { sprintf("%s/%s", [target_ns, name]): o |
                  o := data.inventory.namespace[target_ns]["apps/v1"]["Deployment"][name]
                }
              }
              referrer_deployments := deps {
                same_ns == false
                deps := { sprintf("%s/%s", [ns, name]): o |
                  some ns
                  o := data.inventory.namespace[ns]["apps/v1"]["Deployment"][name]
                }
              }

              # spec.template.spec.volumes[].configMap.name
              cm_name_in_volumes(dep) := name {
                some vi
                vol := dep.spec.template.spec.volumes[vi]
                name := vol.configMap.name
              }

              # spec.template.spec.containers[].envFrom[].configMapRef.name
              cm_name_in_envfrom(dep) := name {
                some ci
                container := dep.spec.template.spec.containers[ci]
                some ei
                ef := container.envFrom[ei]
                name := ef.configMapRef.name
              }

              # spec.template.spec.containers[].env[].valueFrom.configMapKeyRef.name
              cm_name_in_envvalueref(dep) := name {
                some ci
                container := dep.spec.template.spec.containers[ci]
                some ei
                env := container.env[ei]
                name := env.valueFrom.configMapKeyRef.name
              }

              dep_references_cm(dep) {
                cm_name_in_volumes(dep) == target_name
              }
              dep_references_cm(dep) {
                cm_name_in_envfrom(dep) == target_name
              }
              dep_references_cm(dep) {
                cm_name_in_envvalueref(dep) == target_name
              }

              offender[{"name": ref_name}] {
                some key
                dep := referrer_deployments[key]
                dep_references_cm(dep)
                ref_name := dep.metadata.name
              }

              violation[{"msg": msg}] {
                input.review.operation in ops
                off := offender[_]
                msg := sprintf("ConfigMap %q cannot be %sd: Deployment %q still references it",
                  [target_name, lower(input.review.operation), off.name])
              }
