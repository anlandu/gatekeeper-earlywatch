# Gatekeeper external-data Provider pointing at touch-monitor's in-memory
# manual-touch cache.
#
# The caBundle is the PEM-encoded CA that signed manual-touch-monitor-tls,
# base64-encoded. The checked-in value is a syntactically valid
# placeholder CA so dry-run/apply succeeds; replace it with the real serving
# CA for the provider Service before enforcing this policy.
apiVersion: externaldata.gatekeeper.sh/v1beta1
kind: Provider
metadata:
  name: manual-touch-provider
spec:
  url: https://manual-touch-monitor.early-watch-system.svc:8443/validate-manual-touch
  timeout: 3
  caBundle: 
