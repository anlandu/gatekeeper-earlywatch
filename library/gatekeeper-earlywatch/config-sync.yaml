# Sync the kinds the referential constraints in this directory inspect.
# ManualTouchCheck no longer needs ManualTouchEvent sync because it uses
# Gatekeeper external_data backed by touch-monitor's in-memory cache.
apiVersion: config.gatekeeper.sh/v1alpha1
kind: Config
metadata:
  name: config
  namespace: gatekeeper-system
spec:
  sync:
    syncOnly:
      - group: ""
        version: "v1"
        kind: "Pod"
      - group: "apps"
        version: "v1"
        kind: "Deployment"
