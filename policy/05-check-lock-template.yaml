# EarlyWatch CheckLock -> Gatekeeper
# Blocks DELETE (and UPDATE when lockOnMutate=true) when `earlywatch.io/lock`
# annotation is set to a non-empty value on the existing object.
#
# UPDATE has one EarlyWatch escape hatch: if the only object difference is the
# `earlywatch.io/lock` annotation itself, the update is allowed. Upstream strips
# only that annotation (and normalizes empty-vs-absent annotations) before
# comparing oldObject and object, so changes to status or server-managed metadata
# are still treated as additional changes.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewchecklock
spec:
  crd:
    spec:
      names:
        kind: EWCheckLock
      validation:
        openAPIV3Schema:
          type: object
          properties:
            lockOnMutate:
              type: boolean
            annotation:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewchecklock

              default annotation_key := "earlywatch.io/lock"
              annotation_key := k {
                k := input.parameters.annotation
                k != ""
              }

              locked {
                v := input.review.oldObject.metadata.annotations[annotation_key]
                v != ""
              }

              clean_metadata(metadata) := clean {
                annotations := object.get(metadata, "annotations", {})
                clean_annotations := object.remove(annotations, {annotation_key})
                count(clean_annotations) == 0
                clean := object.remove(metadata, {"annotations"})
              }

              clean_metadata(metadata) := clean {
                annotations := object.get(metadata, "annotations", {})
                clean_annotations := object.remove(annotations, {annotation_key})
                count(clean_annotations) > 0
                base_metadata := object.remove(metadata, {"annotations"})
                clean := object.union(base_metadata, {"annotations": clean_annotations})
              }

              without_lock_annotation(obj) := stripped {
                metadata := object.get(obj, "metadata", {})
                base_obj := object.remove(obj, {"metadata"})
                stripped := object.union(base_obj, {"metadata": clean_metadata(metadata)})
              }

              lock_annotation_only_update {
                without_lock_annotation(input.review.oldObject) == without_lock_annotation(input.review.object)
              }

              violation[{"msg": msg}] {
                input.review.operation == "DELETE"
                locked
                msg := sprintf("resource %q is locked by %q; delete denied",
                  [input.review.oldObject.metadata.name, annotation_key])
              }

              violation[{"msg": msg}] {
                input.review.operation == "UPDATE"
                input.parameters.lockOnMutate == true
                locked
                not lock_annotation_only_update
                msg := sprintf("resource %q is locked by %q; update denied",
                  [input.review.oldObject.metadata.name, annotation_key])
              }
