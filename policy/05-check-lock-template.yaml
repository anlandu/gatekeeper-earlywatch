# EarlyWatch CheckLock -> Gatekeeper
# Blocks DELETE (and UPDATE when lockOnMutate=true) when `earlywatch.io/lock`
# annotation is set to a non-empty value on the existing object.
#
# UPDATE has one practical escape hatch: an update that only removes/clears the
# lock annotation is allowed, so a locked object can be unlocked without first
# disabling the constraint. This generic object-diff behavior requires Rego;
# Kubernetes admission CEL cannot strip a nested annotation and compare the full
# arbitrary object safely.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewchecklock
spec:
  crd:
    spec:
      names:
        kind: EWCheckLock
      validation:
        openAPIV3Schema:
          type: object
          properties:
            lockOnMutate:
              type: boolean
            annotation:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewchecklock

              default annotation_key := "earlywatch.io/lock"
              annotation_key := k {
                k := input.parameters.annotation
                k != ""
              }

              locked {
                v := input.review.oldObject.metadata.annotations[annotation_key]
                v != ""
              }

              locked_new {
                v := input.review.object.metadata.annotations[annotation_key]
                v != ""
              }

              # Normalize enough to recognize an unlock-only update in live
              # admission requests. Kubernetes may represent empty annotations
              # as either an empty map or an absent field, and server-managed
              # metadata can differ between oldObject and object.
              metadata_strip_fields := {
                "annotations",
                "resourceVersion",
                "generation",
                "uid",
                "creationTimestamp",
                "managedFields",
                "selfLink",
              }

              clean_metadata(metadata) := clean {
                annotations := object.get(metadata, "annotations", {})
                clean_annotations := object.remove(annotations, {annotation_key})
                base_metadata := object.remove(metadata, metadata_strip_fields)
                count(clean_annotations) == 0
                clean := base_metadata
              }

              clean_metadata(metadata) := clean {
                annotations := object.get(metadata, "annotations", {})
                clean_annotations := object.remove(annotations, {annotation_key})
                base_metadata := object.remove(metadata, metadata_strip_fields)
                count(clean_annotations) > 0
                clean := object.union(base_metadata, {"annotations": clean_annotations})
              }

              without_lock_annotation(obj) := stripped {
                metadata := object.get(obj, "metadata", {})
                base_obj := object.remove(obj, {"metadata", "status"})
                stripped := object.union(base_obj, {"metadata": clean_metadata(metadata)})
              }

              unlock_only_update {
                not locked_new
                without_lock_annotation(input.review.oldObject) == without_lock_annotation(input.review.object)
              }

              violation[{"msg": msg}] {
                input.review.operation == "DELETE"
                locked
                msg := sprintf("resource %q is locked by %q; delete denied",
                  [input.review.oldObject.metadata.name, annotation_key])
              }

              violation[{"msg": msg}] {
                input.review.operation == "UPDATE"
                input.parameters.lockOnMutate == true
                locked
                not unlock_only_update
                msg := sprintf("resource %q is locked by %q; update denied",
                  [input.review.oldObject.metadata.name, annotation_key])
              }
