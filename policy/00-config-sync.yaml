# Sync the kinds the referential constraints in this directory inspect.
# Gatekeeper reads from data.inventory only after these kinds are synced.
apiVersion: config.gatekeeper.sh/v1alpha1
kind: Config
metadata:
  name: config
  namespace: gatekeeper-system
spec:
  sync:
    syncOnly:
      - group: ""
        version: "v1"
        kind: "Pod"
      - group: "apps"
        version: "v1"
        kind: "Deployment"
      - group: "earlywatch.io"
        version: "v1alpha1"
        kind: "ManualTouchEvent"
