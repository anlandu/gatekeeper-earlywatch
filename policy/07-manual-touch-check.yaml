# EarlyWatch ManualTouchCheck -> Gatekeeper
#
# Gatekeeper is stateless at admission time — it cannot itself observe past
# kubectl edits. EarlyWatch records "manual touches" via Events in a system
# namespace; for Gatekeeper we approximate this by requiring an out-of-band
# controller (or a Mutation policy) to stamp the object with an annotation
# `earlywatch.io/last-manual-touch` carrying an RFC3339 timestamp whenever a
# manual change is observed. This template denies UPDATE if that timestamp is
# within the configured window.
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewmanualtouchcheck
spec:
  crd:
    spec:
      names:
        kind: EWManualTouchCheck
      validation:
        openAPIV3Schema:
          type: object
          properties:
            windowSeconds:
              type: integer
            annotation:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package ewmanualtouchcheck

        default annotation_key := "earlywatch.io/last-manual-touch"
        annotation_key := k {
          k := input.parameters.annotation
          k != ""
        }

        touched_ns := ns {
          ts := input.review.oldObject.metadata.annotations[annotation_key]
          ns := time.parse_rfc3339_ns(ts)
        }

        violation[{"msg": msg}] {
          input.review.operation == "UPDATE"
          window_ns := input.parameters.windowSeconds * 1000000000
          age := time.now_ns() - touched_ns
          age < window_ns
          msg := sprintf(
            "%q was manually touched %ds ago (window %ds); update denied",
            [input.review.oldObject.metadata.name,
             age / 1000000000,
             input.parameters.windowSeconds])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: EWManualTouchCheck
metadata:
  name: block-recent-manual-touch
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
  parameters:
    windowSeconds: 7200       # 2h, matching the EarlyWatch example
    annotation: "earlywatch.io/last-manual-touch"
