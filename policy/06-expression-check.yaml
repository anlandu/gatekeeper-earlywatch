# EarlyWatch ExpressionCheck -> Gatekeeper
# Blocks DELETE in a specific namespace ("production").
# EarlyWatch uses an embedded expression language; in Gatekeeper the
# equivalent is a parameterised Rego rule.
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewexpressioncheck
spec:
  crd:
    spec:
      names:
        kind: EWExpressionCheck
      validation:
        openAPIV3Schema:
          type: object
          properties:
            blockedNamespaces:
              type: array
              items:
                type: string
            blockedOperations:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package ewexpressioncheck

        import future.keywords.in

        violation[{"msg": msg}] {
          input.review.operation in input.parameters.blockedOperations
          input.review.namespace in input.parameters.blockedNamespaces
          msg := sprintf("%s in namespace %q is not permitted",
            [input.review.operation, input.review.namespace])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: EWExpressionCheck
metadata:
  name: block-delete-in-production-namespace
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["ConfigMap"]
  parameters:
    blockedNamespaces: ["production"]
    blockedOperations: ["DELETE"]
