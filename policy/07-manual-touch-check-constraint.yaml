apiVersion: constraints.gatekeeper.sh/v1beta1
kind: EWManualTouchCheck
metadata:
  name: block-recent-manual-touch
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
  parameters:
    operations: ["UPDATE"]
    windowDuration: "2h"
    provider: "manual-touch-provider"
    failureMode: "Ignore"
