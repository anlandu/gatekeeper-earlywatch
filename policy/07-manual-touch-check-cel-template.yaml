# EarlyWatch ManualTouchCheck — annotation variant
#
# Kubernetes admission CEL intentionally does not expose wall-clock time, so a
# true "annotation timestamp is within N seconds of now" check cannot be
# implemented as K8sNativeValidation. This deploy-safe variant uses Rego for the
# time comparison while keeping the annotation-based, no-inventory UX. The
# EarlyWatch-parity implementation remains policy/07-manual-touch-check-template.yaml,
# which queries touch-monitor's external-data provider and in-memory cache.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewmanualtouchcheckcel
spec:
  crd:
    spec:
      names:
        kind: EWManualTouchCheckCEL
      validation:
        openAPIV3Schema:
          type: object
          properties:
            annotation:
              type: string
            windowSeconds:
              type: integer
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            rego: |
              package ewmanualtouchcheckcel

              annotation_key := k {
                k := input.parameters.annotation
                k != ""
              } else := "earlywatch.io/last-manual-touch"

              window_seconds := s {
                s := input.parameters.windowSeconds
                s > 0
              } else := 3600

              object_annotations := object.get(object.get(input.review.object, "metadata", {}), "annotations", {})
              old_annotations := object.get(object.get(input.review.oldObject, "metadata", {}), "annotations", {})

              touch_annotation := v {
                v := object.get(object_annotations, annotation_key, "")
                v != ""
              } else := v {
                v := object.get(old_annotations, annotation_key, "")
                v != ""
              }

              violation[{"msg": msg}] {
                input.review.operation == "UPDATE"
                touch_annotation != ""
                touch_ns := time.parse_rfc3339_ns(touch_annotation)
                window_ns := window_seconds * 1000000000
                time.now_ns() - touch_ns < window_ns
                msg := sprintf("resource was manually touched within %ds; update denied", [window_seconds])
              }
