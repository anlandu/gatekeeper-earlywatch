# EarlyWatch ExistingResources -> Gatekeeper referential constraint
# Blocks DELETE of a Service while Pods matching its selector still exist.
# Requires Pods synced into data.inventory (see 00-config-sync.yaml).
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewexistingresources
  annotations:
    metadata.gatekeeper.sh/requires-sync-data: |
      "[[{\"groups\":[\"\"], \"versions\":[\"v1\"], \"kinds\":[\"Pod\"]}]]"
spec:
  crd:
    spec:
      names:
        kind: EWExistingResources
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package ewexistingresources

        import future.keywords.every
        import future.keywords.in

        selector := input.review.oldObject.spec.selector
        ns       := input.review.oldObject.metadata.namespace

        pod_matches(pod) {
          count(selector) > 0
          every k, v in selector {
            pod.metadata.labels[k] == v
          }
        }

        violation[{"msg": msg}] {
          input.review.operation == "DELETE"
          some name
          pod := data.inventory.namespace[ns]["v1"]["Pod"][name]
          pod_matches(pod)
          msg := sprintf("Service %q cannot be deleted while matching Pod %q exists",
            [input.review.oldObject.metadata.name, name])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: EWExistingResources
metadata:
  name: service-must-have-no-matching-pods
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Service"]
