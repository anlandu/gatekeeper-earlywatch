# EarlyWatch NameReferenceCheck -> Gatekeeper referential constraint
# Blocks DELETE of a ConfigMap if a Deployment in the same namespace
# still references it via volumes.configMap.name or envFrom.configMapRef.name.
# Requires Deployments synced into data.inventory.
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: ewnamereferencecheck
  annotations:
    metadata.gatekeeper.sh/requires-sync-data: |
      "[[{\"groups\":[\"apps\"], \"versions\":[\"v1\"], \"kinds\":[\"Deployment\"]}]]"
spec:
  crd:
    spec:
      names:
        kind: EWNameReferenceCheck
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package ewnamereferencecheck

        target_name := input.review.oldObject.metadata.name
        ns          := input.review.oldObject.metadata.namespace

        referenced_by_volume(dep) {
          some v
          dep.spec.template.spec.volumes[v].configMap.name == target_name
        }

        referenced_by_envfrom(dep) {
          some c, e
          dep.spec.template.spec.containers[c].envFrom[e].configMapRef.name == target_name
        }

        referencing_dep[name] {
          dep := data.inventory.namespace[ns]["apps/v1"]["Deployment"][name]
          referenced_by_volume(dep)
        }
        referencing_dep[name] {
          dep := data.inventory.namespace[ns]["apps/v1"]["Deployment"][name]
          referenced_by_envfrom(dep)
        }

        violation[{"msg": msg}] {
          input.review.operation == "DELETE"
          some name
          referencing_dep[name]
          msg := sprintf("ConfigMap %q cannot be deleted; Deployment %q still references it",
            [target_name, name])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: EWNameReferenceCheck
metadata:
  name: configmap-not-referenced
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["ConfigMap"]
