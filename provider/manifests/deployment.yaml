apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: approval-verifier
  namespace: gatekeeper-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval-verifier
  namespace: gatekeeper-system
  labels: {app: approval-verifier}
spec:
  replicas: 2
  selector:
    matchLabels: {app: approval-verifier}
  template:
    metadata:
      labels: {app: approval-verifier}
    spec:
      serviceAccountName: approval-verifier
      containers:
        - name: provider
          image: ghcr.io/your-org/earlywatch-approval-verifier:latest
          args: ["--addr=:8443", "--cert=/certs/tls.crt", "--key=/certs/tls.key"]
          ports:
            - containerPort: 8443
          readinessProbe:
            httpGet: {path: /healthz, port: 8443, scheme: HTTPS}
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities: {drop: ["ALL"]}
      volumes:
        - name: certs
          secret:
            secretName: approval-verifier-tls
---
apiVersion: v1
kind: Service
metadata:
  name: approval-verifier
  namespace: gatekeeper-system
spec:
  selector: {app: approval-verifier}
  ports:
    - port: 8443
      targetPort: 8443
